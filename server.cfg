// =============================================================================
// Quake 3 Arena — Dedicated Server Configuration
// =============================================================================

// --- Server Identity ---
set sv_hostname      "Quake 3 Arena Server"
set sv_maxclients    16
set g_motd           "Tancuj, tancuj, vykrucaj; len mi ritku nerozbuchaj!"

// --- Network ---
set sv_maxRate       25000
set sv_minPing       0
set sv_maxPing       300
set sv_floodProtect  1

// --- Gameplay ---
set g_gametype       0           // 0=FFA, 1=Tournament, 3=TDM, 4=CTF
set fraglimit        30
set timelimit        15
set g_inactivity     120
set g_forcerespawn   5
set g_weaponrespawn  3
set g_quadfactor     3

// --- RCON (Remote Console) ---
// RCON password is injected via Q3_RCON environment variable.
// Do NOT set rconpassword here.

// --- Logging ---
set g_log            "server.log"
set g_logSync        1
set logfile          1

// --- Bots ---
set bot_enable       0
set bot_minplayers   0

// --- Map Rotation ---
set d1 "map q3dm17; set nextmap vstr d2"
set d2 "map q3dm6;  set nextmap vstr d3"
set d3 "map q3tourney2; set nextmap vstr d4"
set d4 "map q3dm7;  set nextmap vstr d5"
set d5 "map q3dm11; set nextmap vstr d6"
set d6 "map q3dm12; set nextmap vstr d7"
set d7 "map q3dm1;  set nextmap vstr d1"
vstr d1
